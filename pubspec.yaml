name: zerocopy
description: >-
  Eliminates the Dart-Native "Copy Tax" using SIMD-aligned C++ shared memory,
  Pointer.asTypedList() bridging, and an atomic spinlock. Zero serialization. Zero GC impact.
version: 0.1.1
homepage: https://momarkhan.com/
repository: https://github.com/umarKhan1/zerocopy
issue_tracker: https://github.com/umarKhan1/zerocopy/issues
topics:
  - ffi
  - performance
  - memory
  - native
  - dart-ffi

environment:
  sdk: ^3.6.0

dependencies:
  code_assets: ^1.0.0
  ffi: ^2.1.2
  hooks: ^1.0.3
  native_toolchain_c: ^0.18.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
